<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Content Review</h2>

    <div id="loadingMsg" class="feedback-screen">
        <div class="spinner"></div>
        <h3>Loading</h3>
        <p>Fetching your assigned content...</p>
    </div>

    <div class="form-group hidden" id="loginSection">
        <label for="usernameSelect">Select Profile</label>
        <select id="usernameSelect" onchange="startSession()">
            <option value="">Choose your name</option>
        </select>
    </div>

    <div id="playerSection" class="hidden">
        <div class="status-wrapper">
            <div class="status-text">
                Reviewing <strong style="color: var(--text-main);"><span id="currentCount">0</span> of <span id="totalCount">0</span></strong>
            </div>
        </div>
        
        <div class="fallback-link-container">
            Platform: <span id="platformLabel" style="font-weight:600; color:var(--text-main);">Content</span>
            <a id="directOpenLink" href="#" target="_blank">Open directly ↗</a>
        </div>

        <div class="video-container" id="videoContainer">
            <iframe id="videoFrame" src="" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </div>

        <div class="form-group">
            <label for="judgement">Judgement</label>
            <select id="judgement">
                <option value="">Select</option>
                <option value="Correct">Correct</option>
                <option value="Incorrect">Incorrect</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" placeholder="Feel free to add any additional context here."></textarea>
        </div>

        <button id="submitBtn" onclick="submitResult()">Submit (Enter)</button>
        
        <div class="form-group hidden" id="skipReasonSection">
            <label for="skipReason">Reason for Skipping</label>
            <select id="skipReason">
                <option value="">Select a reason</option>
                <option value="The video is not loading/working">The video is not loading/working</option>
                <option value="The video is unavailable in my region">The video is unavailable in my region</option>
            </select>
        </div>

        <button id="skipBtn" class="btn-secondary" onclick="skipResult()">Skip / Broken Link</button>
    </div>

    <div id="progressSection" class="feedback-screen hidden">
        <div class="spinner"></div>
        <h3>Saving Submission</h3>
        <p id="progressText">Logging reviews...</p>
    </div>

    <div id="finishedSection" class="feedback-screen hidden">
        <h3>Reviewed</h3>
        <p>There are no more pending videos assigned to you. Thank you for your participation!</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
